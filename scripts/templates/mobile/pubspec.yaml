name: __VERTICAL_SNAKE__
description: "__VERTICAL_PASCAL__"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Shared KuroLabs packages
  kurolabs_auth:
    path: ../../../shared/mobile/packages/kurolabs_auth
  kurolabs_hub:
    path: ../../../shared/mobile/packages/kurolabs_hub

  # Supabase
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1
