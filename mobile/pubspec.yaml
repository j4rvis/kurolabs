name: kurolabs
description: "KuroLabs shell app — adventure hub for all verticals"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Shared KuroLabs packages
  kurolabs_auth:
    path: ../shared/mobile/packages/kurolabs_auth
  kurolabs_hub:
    path: ../shared/mobile/packages/kurolabs_hub

  # Vertical modules
  questify_module:
    path: ../verticals/questify/mobile

  # Supabase
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # In-app updates
  in_app_update: ^4.2.3
  upgrader: ^10.3.0

  # UI / theming
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

  # Charts (character sheet radar/bar charts)
  fl_chart: ^0.70.2

  # HTTP client for Next.js API
  http: ^1.2.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/npc/
