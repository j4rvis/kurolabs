<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family:'Syne Mono'; src:url('../fonts/SyneMono-Regular.ttf') format('truetype'); }
*{box-sizing:border-box;margin:0;padding:0;}
body { background:#f5f0e8; font-family:'Syne Mono',monospace; padding:16px; }
.row { border-bottom:1px solid #e2dbd0; padding:10px 0; display:flex; align-items:baseline; gap:16px; }
.row:last-child{border-bottom:none;}
.meta { font-size:9px; color:#9c8c78; min-width:130px; flex-shrink:0; line-height:1.6; letter-spacing:.04em; }
</style></head>
<body>
  <div class="row">
    <div class="meta">Cinzel 700 · logotype only</div>
    <div style="font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:#b07030;letter-spacing:.25em;text-transform:uppercase">KUROLABS</div>
  </div>
  <div class="row">
    <div class="meta">Cinzel 400 · kanji display</div>
    <div style="font-family:'Cinzel',serif;font-size:28px;color:#3d5a9e;opacity:.3;letter-spacing:.05em">想</div>
    <div style="font-size:11px;color:#9c8c78;align-self:center;letter-spacing:.06em">Omoi</div>
  </div>
  <div class="row">
    <div class="meta">Syne Mono · heading</div>
    <div style="font-size:16px;color:#1c1612;letter-spacing:.12em">Quest Board</div>
  </div>
  <div class="row">
    <div class="meta">Syne Mono · body</div>
    <div style="font-size:12px;color:#5c4f3d;letter-spacing:.03em;line-height:1.65">Turn your daily habits into epic quests</div>
  </div>
  <div class="row">
    <div class="meta">Syne Mono · label / muted</div>
    <div style="font-size:10px;color:#9c8c78;letter-spacing:.08em">7 active quests · 3 day streak</div>
  </div>
  <div class="row">
    <div class="meta">Syne Mono · tag / mono</div>
    <div style="font-size:10px;color:#3d5a9e;letter-spacing:.04em">#design  #japan  #space</div>
  </div>
</body></html>
