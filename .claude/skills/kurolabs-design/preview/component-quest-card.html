<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
@font-face { font-family:'Syne Mono'; src:url('../fonts/SyneMono-Regular.ttf') format('truetype'); }
*{box-sizing:border-box;margin:0;padding:0;}
body { background:#f5f0e8; font-family:'Syne Mono',monospace; padding:16px; }
.card { background:#faf8f3; border:1px solid #d0c4b0; border-radius:4px; padding:18px; display:flex; flex-direction:column; gap:12px; }
.badge { display:inline-flex; align-items:center; padding:2px 7px; border-radius:2px; font-size:10px; border:1px solid; letter-spacing:.04em; }
.divider { border-top:1px solid #e2dbd0; padding-top:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
</style></head>
<body>
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
    <div>
      <div style="font-size:12px;color:#1c1612;letter-spacing:.03em;line-height:1.4">Morning Run — 30 minutes</div>
      <div style="font-size:10px;color:#9c8c78;margin-top:3px;letter-spacing:.04em">Bronn Ironveil</div>
    </div>
    <button style="background:transparent;border:1px solid #d0c4b0;color:#9c8c78;border-radius:2px;padding:4px 10px;font-size:10px;letter-spacing:.04em;font-family:'Syne Mono',monospace;cursor:pointer">complete</button>
  </div>
  <div style="font-size:10px;color:#9c8c78;line-height:1.6">Push your limits with an early run. Every step brings you closer to mastery.</div>
  <div class="divider">
    <span class="badge" style="background:#e8f0f9;color:#2d5a8e;border-color:#b0c8e8">Daily</span>
    <span class="badge" style="background:#eaf4ee;color:#3d7a52;border-color:#b8d9c4">Easy</span>
    <span style="margin-left:auto;font-size:10px;color:#b83c3c;letter-spacing:.06em">50 xp</span>
  </div>
  <div style="font-size:10px;color:#9c8c78;letter-spacing:.04em">↑ 7 day streak</div>
</div>
</body></html>
