<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
@font-face { font-family:'Syne Mono'; src:url('../fonts/SyneMono-Regular.ttf') format('truetype'); }
*{box-sizing:border-box;margin:0;padding:0;}
body { background:#f5f0e8; font-family:'Syne Mono',monospace; padding:16px; }
.row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:2px; font-size:10px; border:1px solid; letter-spacing:.04em; }
.label { font-size:9px; color:#9c8c78; margin-bottom:6px; letter-spacing:.1em; text-transform:uppercase; }
.xp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.xp-cell { background:#faf8f3; border:1px solid #e2dbd0; border-radius:2px; padding:8px; text-align:center; }
</style></head>
<body>
<div class="label">Difficulty</div>
<div class="row">
  <span class="badge" style="background:#f0f1f2;color:#8a9099;border-color:#d0d4d8">Trivial</span>
  <span class="badge" style="background:#eaf4ee;color:#3d7a52;border-color:#b8d9c4">Easy</span>
  <span class="badge" style="background:#f9f0e4;color:#b07030;border-color:#e0c89a">Medium</span>
  <span class="badge" style="background:#f9ece4;color:#b85a20;border-color:#e0b898">Hard</span>
  <span class="badge" style="background:#f9e4e4;color:#b83c3c;border-color:#e0a8a8">Deadly</span>
  <span class="badge" style="background:#f0eaf9;color:#7040a0;border-color:#c8aee0">Legendary</span>
</div>
<div class="label">Quest Type</div>
<div class="row">
  <span class="badge" style="background:#e8f0f9;color:#2d5a8e;border-color:#b0c8e8">Daily</span>
  <span class="badge" style="background:#eaf4ee;color:#3d7a52;border-color:#b8d9c4">Side Quest</span>
  <span class="badge" style="background:#f0eaf9;color:#7040a0;border-color:#c8aee0">Epic</span>
</div>
<div class="label">XP Rewards</div>
<div class="xp-grid">
  <div class="xp-cell"><div style="font-size:15px;color:#8a9099">25</div><div style="font-size:9px;color:#9c8c78;margin-top:2px">Trivial</div></div>
  <div class="xp-cell"><div style="font-size:15px;color:#3d7a52">50</div><div style="font-size:9px;color:#9c8c78;margin-top:2px">Easy</div></div>
  <div class="xp-cell"><div style="font-size:15px;color:#b07030">100</div><div style="font-size:9px;color:#9c8c78;margin-top:2px">Medium</div></div>
  <div class="xp-cell"><div style="font-size:15px;color:#b85a20">250</div><div style="font-size:9px;color:#9c8c78;margin-top:2px">Hard</div></div>
  <div class="xp-cell"><div style="font-size:15px;color:#b83c3c">500</div><div style="font-size:9px;color:#9c8c78;margin-top:2px">Deadly</div></div>
  <div class="xp-cell"><div style="font-size:15px;color:#7040a0">1000</div><div style="font-size:9px;color:#9c8c78;margin-top:2px">Legendary</div></div>
</div>
</body></html>
