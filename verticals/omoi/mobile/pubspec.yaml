name: omoi_module
description: "Omoi feature module for KuroLabs"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Shared KuroLabs packages
  kurolabs_auth:
    path: ../../../shared/mobile/packages/kurolabs_auth
  kurolabs_hub:
    path: ../../../shared/mobile/packages/kurolabs_hub

  # Supabase
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # UI / theming
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # HTTP client for Next.js API
  http: ^1.2.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
